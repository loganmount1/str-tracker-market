name: Mt Hood Market Scrape

# Two triggers:
#   - Daily collection (every run): pulls calendars/details/pricing for known listings.
#   - Weekly discovery (Mondays): also re-searches Airbnb to find NEW listings.
# The weekly Monday run does BOTH discovery and collection; the daily runs only collect.
on:
  workflow_dispatch:
    inputs:
      run_discovery:
        description: "Force a discovery pass on this manual run"
        type: boolean
        default: false
  schedule:
    - cron: '23 14 * * *'    # Daily collection — 14:23 UTC = 7:23 AM PDT
    - cron: '23 16 * * 1'    # Weekly discovery — Mondays 16:23 UTC = 9:23 AM PDT

permissions:
  contents: read

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 300

    steps:
      - name: Checkout scraper repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      # ──────────────────────────────────────────────────────────────────
      # Restore the database from the PRIVATE data repo.
      # The DB is ~3 GB raw / ~370 MB gzipped — far over GitHub's 100 MB file
      # limit — so it is NOT committed. It is stored as a RELEASE ASSET on a
      # separate PRIVATE repo (release assets allow up to 2 GB and stay private
      # on a private repo) and pulled in here via the gh CLI using a PAT secret.
      # TODO: create private repo `loganmount1/str-tracker-data`, a fine-grained
      #       PAT with Contents:read+write on it, and add it as secret DATA_REPO_PAT.
      # ──────────────────────────────────────────────────────────────────
      - name: Restore market_tracker.db from private data repo (release asset)
        env:
          GH_TOKEN: ${{ secrets.DATA_REPO_PAT }}
        run: |
          mkdir -p market data
          if gh release download db-latest -R loganmount1/str-tracker-data -p 'market_tracker.db.gz' -D /tmp 2>/dev/null; then
            gunzip -f /tmp/market_tracker.db.gz
            mv /tmp/market_tracker.db market/market_tracker.db
            echo "Restored DB: $(du -h market/market_tracker.db | cut -f1)"
            # GUARD: refuse to build on a corrupt DB. Exiting non-zero here means
            # the job fails BEFORE the upload step, so the good release asset is
            # never overwritten by a bad run. (This is exactly the failure mode
            # that silently destroyed the backup on 2026-06-25.)
            python -c "import sqlite3,sys; r=sqlite3.connect('market/market_tracker.db').execute('PRAGMA quick_check').fetchone()[0]; print('Restored DB integrity:', r); sys.exit(0 if r=='ok' else 1)"
          else
            echo "No existing DB release found — first run will create one via discovery + init_db."
          fi

      # ──────────────────────────────────────────────────────────────────
      # Decide whether this run includes discovery.
      # Discovery runs on the weekly Monday cron, or when manually forced.
      # ──────────────────────────────────────────────────────────────────
      - name: Determine run mode
        id: mode
        run: |
          DISCOVER="false"
          # Weekly discovery cron
          if [ "${{ github.event.schedule }}" = "23 16 * * 1" ]; then
            DISCOVER="true"
          fi
          # Manual override
          if [ "${{ github.event.inputs.run_discovery }}" = "true" ]; then
            DISCOVER="true"
          fi
          echo "discover=$DISCOVER" >> "$GITHUB_OUTPUT"
          echo "Discovery this run: $DISCOVER"

      # ── Discovery (weekly only) ──
      - name: Discovery - search Airbnb for Mt Hood listings
        if: steps.mode.outputs.discover == 'true'
        run: |
          # collect_market_data.py writes market snapshots into data/tracker.db,
          # so make sure that dir exists. init_db seeds market/market_tracker.db
          # from those discovered listings on first run; sync_new_listings adds
          # any newly discovered listings on subsequent runs.
          mkdir -p data
          python collect_market_data.py
          if [ ! -f market/market_tracker.db ]; then
            python market/init_db.py
          fi
          python market/sync_new_listings.py
        continue-on-error: true
        timeout-minutes: 30

      # ── Collection (every run) ──
      - name: Collect calendars, details, reviews, pricing
        run: python market/collect_all.py --workers 4
        continue-on-error: true
        timeout-minutes: 180

      - name: Retry today's failures
        run: python market/collect_all.py --retry
        continue-on-error: true
        timeout-minutes: 60

      - name: Finalize - compute metrics + housekeeping
        run: python market/collect_all.py --finalize
        continue-on-error: true
        timeout-minutes: 20

      # ──────────────────────────────────────────────────────────────────
      # Save the updated database back to the PRIVATE data repo as a release
      # asset (gzipped). --clobber overwrites the previous day's asset.
      # ──────────────────────────────────────────────────────────────────
      - name: Save updated market_tracker.db to private data repo (release asset)
        env:
          GH_TOKEN: ${{ secrets.DATA_REPO_PAT }}
        run: |
          # GUARD: never overwrite the good backup with a corrupt DB. Verify
          # integrity BEFORE compressing/uploading; exit non-zero on failure so
          # the job goes red and the previous good asset is preserved.
          python -c "import sqlite3,sys; r=sqlite3.connect('market/market_tracker.db').execute('PRAGMA quick_check').fetchone()[0]; print('Pre-upload DB integrity:', r); sys.exit(0 if r=='ok' else 1)"
          # Checkpoint the WAL so the .db file is self-contained before compressing.
          python -c "import sqlite3; db=sqlite3.connect('market/market_tracker.db'); db.execute('PRAGMA wal_checkpoint(TRUNCATE)'); db.close()"
          gzip -c market/market_tracker.db > market_tracker.db.gz
          echo "Compressed DB: $(du -h market_tracker.db.gz | cut -f1)"
          # Create the release once (no-op if it already exists), then upload.
          gh release create db-latest -R loganmount1/str-tracker-data \
            -t "Market DB (latest)" -n "Rolling market_tracker.db snapshot" 2>/dev/null || true
          gh release upload db-latest market_tracker.db.gz -R loganmount1/str-tracker-data --clobber
          echo "Uploaded market_tracker.db.gz to db-latest release."

          # ── Rolling backup: keep the last 7 daily snapshots ──
          # db-latest is a single overwriting pointer, so a bad copy can wipe the
          # only backup. Also store a DATED snapshot in a separate `db-backups`
          # release and prune to the 7 newest, so there is always a known-good
          # fallback to roll back to. (Integrity was already verified above, so
          # every snapshot stored here is good.)
          DATE_TAG="$(date -u +%Y-%m-%d)"
          gh release create db-backups -R loganmount1/str-tracker-data \
            -t "DB rolling backups (last 7 days)" -n "Dated market_tracker.db snapshots; pruned to 7 newest." 2>/dev/null || true
          # The asset NAME must be the dated filename (gh names assets after the
          # local file; the `file#label` syntax only sets a display label, not the
          # name), so copy to a dated filename before uploading.
          cp market_tracker.db.gz "market_tracker_${DATE_TAG}.db.gz"
          gh release upload db-backups "market_tracker_${DATE_TAG}.db.gz" -R loganmount1/str-tracker-data --clobber
          echo "Stored dated backup market_tracker_${DATE_TAG}.db.gz"
          # Prune: asset names are YYYY-MM-DD so they sort chronologically. Keep
          # the 7 newest, delete the rest.
          gh release view db-backups -R loganmount1/str-tracker-data --json assets \
            --jq '.assets | map(.name) | sort | reverse | .[7:] | .[]' | while read -r OLD; do
              [ -n "$OLD" ] && gh release delete-asset db-backups "$OLD" -R loganmount1/str-tracker-data --yes && echo "Pruned old backup: $OLD"
            done

      # ──────────────────────────────────────────────────────────────────
      # OPTIONAL: sync aggregated market data to Supabase.
      # Disabled by default. Uncomment and provide a sync script if you want
      # the scraped market data pushed to a Supabase project.
      # TODO: add your own sync_market_to_supabase.py (NOT included in this
      #       public repo) before enabling this step.
      # ──────────────────────────────────────────────────────────────────
      # - name: Sync market data to Supabase
      #   env:
      #     SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      #     SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      #   run: python sync_market_to_supabase.py
      #   continue-on-error: true
